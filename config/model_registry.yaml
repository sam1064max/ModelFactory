# ──────────────────────────────────────────────────────────────────────────────
# Model Registry Configuration
# Defines all models in the platform. Each entry specifies the model type,
# features, hyperparameter search space, and deployment configuration.
#
# In production, this file would contain 10,000 entries.
# This demo includes 10 representative models.
# ──────────────────────────────────────────────────────────────────────────────

defaults:
  retrain_schedule: "weekly"
  evaluation_metrics: ["roc_auc", "f1", "precision", "recall"]
  cv_folds: 5
  random_seed: 42

models:
  # ── Classification Models ────────────────────────────────────────────────
  - model_id: "clf_us_retail_conversion"
    description: "Predicts conversion likelihood for US retail customers"
    model_type: "xgboost_classifier"
    target_column: "target_binary"
    feature_set_id: "fs_all_features"
    training_filter: null   # Use all data for demo
    hyperparameter_space:
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      n_estimators: [100, 300, 500]
      subsample: [0.7, 0.8, 0.9]
      colsample_bytree: [0.7, 0.8, 0.9]
      min_child_weight: [1, 3, 5]
      reg_alpha: [0.0, 0.1, 1.0]
      reg_lambda: [0.0, 0.1, 1.0]
    champion_threshold:
      roc_auc_min: 0.65

  - model_id: "clf_eu_retail_conversion"
    description: "Predicts conversion likelihood for EU retail customers"
    model_type: "xgboost_classifier"
    target_column: "target_binary"
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      n_estimators: [100, 300]
      subsample: [0.8, 0.9]
      colsample_bytree: [0.8, 0.9]
    champion_threshold:
      roc_auc_min: 0.65

  - model_id: "clf_apac_propensity"
    description: "Propensity model for APAC market"
    model_type: "lightgbm_classifier"
    target_column: "target_binary"
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      n_estimators: [100, 300, 500]
      num_leaves: [31, 63, 127]
      min_child_samples: [10, 20, 50]
      subsample: [0.7, 0.8]
    champion_threshold:
      roc_auc_min: 0.65

  - model_id: "clf_global_churn"
    description: "Customer churn prediction across all segments"
    model_type: "xgboost_classifier"
    target_column: "target_binary"
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      max_depth: [3, 5, 7, 9]
      learning_rate: [0.01, 0.05]
      n_estimators: [200, 500]
      subsample: [0.8]
      scale_pos_weight: [1, 3, 5]
    champion_threshold:
      roc_auc_min: 0.60

  - model_id: "clf_fraud_detection"
    description: "Fraud detection model with high recall target"
    model_type: "xgboost_classifier"
    target_column: "target_binary"
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      max_depth: [5, 7, 9]
      learning_rate: [0.01, 0.05]
      n_estimators: [300, 500, 800]
      subsample: [0.7, 0.8]
      scale_pos_weight: [5, 10, 20]
    evaluation_metrics: ["roc_auc", "recall", "precision", "f1"]
    champion_threshold:
      roc_auc_min: 0.70

  # ── Regression Models ────────────────────────────────────────────────────
  - model_id: "reg_ltv_prediction"
    description: "Customer lifetime value prediction"
    model_type: "xgboost_regressor"
    target_column: "target_continuous"
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      n_estimators: [100, 300, 500]
      subsample: [0.7, 0.8, 0.9]
      reg_alpha: [0.0, 0.1]
      reg_lambda: [0.0, 0.1, 1.0]
    evaluation_metrics: ["rmse", "mae", "r2"]
    champion_threshold:
      r2_min: 0.30

  - model_id: "reg_revenue_forecast"
    description: "Revenue forecasting per customer segment"
    model_type: "lightgbm_regressor"
    target_column: "target_continuous"
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      n_estimators: [100, 300]
      num_leaves: [31, 63]
      min_child_samples: [10, 20]
    evaluation_metrics: ["rmse", "mae", "r2"]
    champion_threshold:
      r2_min: 0.25

  - model_id: "reg_pricing_elasticity"
    description: "Price elasticity estimation"
    model_type: "xgboost_regressor"
    target_column: "target_continuous"
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      max_depth: [3, 5]
      learning_rate: [0.01, 0.05]
      n_estimators: [200, 500]
      subsample: [0.8, 0.9]
    evaluation_metrics: ["rmse", "mae", "r2"]
    champion_threshold:
      r2_min: 0.20

  # ── Clustering Models ────────────────────────────────────────────────────
  - model_id: "clust_customer_segments"
    description: "Customer segmentation via KMeans"
    model_type: "sklearn_kmeans"
    target_column: null            # Unsupervised
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      n_clusters: [3, 5, 8, 10]
      init: ["k-means++"]
      n_init: [10, 20]
      max_iter: [300, 500]
    evaluation_metrics: ["silhouette_score", "calinski_harabasz"]
    champion_threshold:
      silhouette_min: 0.15

  - model_id: "clust_product_affinity"
    description: "Product affinity groups"
    model_type: "sklearn_kmeans"
    target_column: null
    feature_set_id: "fs_all_features"
    training_filter: null
    hyperparameter_space:
      n_clusters: [5, 8, 12]
      init: ["k-means++"]
      n_init: [10]
      max_iter: [300]
    evaluation_metrics: ["silhouette_score", "calinski_harabasz"]
    champion_threshold:
      silhouette_min: 0.10

# ── Feature Sets ───────────────────────────────────────────────────────────
feature_sets:
  fs_all_features:
    description: "Full feature set — all transformed features"
    source_table: "gold.features"
    max_features: 30               # After selection
    selection_method: "importance"
